    <script>
        // Скрываем индикатор загрузки после полной загрузки страницы
        window.addEventListener('load', function() {
            const loader = document.getElementById('loadingIndicator');
            if (loader) {
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                    }, 500);
                }, 500);
            }
        });
